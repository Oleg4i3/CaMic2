plugins {
    id 'com.android.application'
}

android {
    namespace 'com.simplecam'
    compileSdk 35

    defaultConfig {
        applicationId "com.simplecam"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                         'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // Убираем предупреждение о lint в CI
    lint {
        abortOnError false
        checkReleaseBuilds false
    }

    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    // OpenCV Android (официальный Maven-пакет, доступен с версии 4.9.0)
    implementation 'org.opencv:opencv:4.9.0'

    
}
