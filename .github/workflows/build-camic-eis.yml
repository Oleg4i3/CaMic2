name: Build CaMic + EIS (OpenCV Stabilizer) v5

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Patch sources and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch app/build.gradle
        run: |
          python3 /dev/stdin << 'PYEOF'
          import re, sys
          path = 'app/build.gradle'
          with open(path) as f:
              txt = f.read()
          if 'quickbirdstudios' in txt:
              print('already present'); sys.exit(0)
          if 'dependencies {}' in txt:
              txt = txt.replace('dependencies {}',
                  "dependencies {\n"
                  "    constraints {\n"
                  "        implementation(\"org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22\")\n"
                  "        implementation(\"org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22\")\n"
                  "    }\n"
                  "    implementation 'com.quickbirdstudios:opencv:4.5.3.0'\n"
                  "}")
          else:
              txt = re.sub(r'(dependencies\s*\{)',
                  r"\1\n    implementation 'com.quickbirdstudios:opencv:4.5.3.0'",
                  txt, count=1)
          txt = re.sub(r'minSdk\s+2[0-3]\b', 'minSdk 24', txt)
          with open(path, 'w') as f: f.write(txt)
          print('build.gradle OK')
          PYEOF

      - name: Patch gradle.properties
        run: |
          sed -i 's/android\.useAndroidX=false/android.useAndroidX=true/' gradle.properties || true
          grep -q 'android.useAndroidX'    gradle.properties || echo 'android.useAndroidX=true'    >> gradle.properties
          grep -q 'android.enableJetifier' gradle.properties || echo 'android.enableJetifier=true' >> gradle.properties

      - name: Patch MainActivity.java - EIS v5
        run: |
          echo '' | base64 -d > /tmp/patch_eis.py
          python3 /tmp/patch_eis.py

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.7; fi
          sed -i 's|gradle-[0-9.]*-\(all\|bin\)|gradle-8.7-all|g' gradle/wrapper/gradle-wrapper.properties 2>/dev/null || true
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CaMic-EIS-APK
          path: app/build/outputs/apk/debug/app-debug.apk
