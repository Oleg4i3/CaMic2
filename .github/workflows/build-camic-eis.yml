name: Build CaMic + EIS (OpenCV Stabilizer)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Patch sources and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 1. OpenCV в build.gradle ─────────────────────────────────────────────
      - name: Patch app/build.gradle
        run: |
          python3 - << 'PYEOF'
          import re, sys
          path = 'app/build.gradle'
          with open(path) as f:
              txt = f.read()
          if 'quickbirdstudios' in txt:
              print("OpenCV already present"); sys.exit(0)
          txt = txt.replace('dependencies {}',
              'dependencies {\n'
              '    constraints {\n'
              '        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22")\n'
              '        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22")\n'
              '    }\n'
              '    implementation \'com.quickbirdstudios:opencv:4.5.3.0\'\n'
              '}')
          if 'quickbirdstudios' not in txt:
              txt = re.sub(r'(dependencies\s*\{)',
                  r"\1\n    implementation 'com.quickbirdstudios:opencv:4.5.3.0'", txt, count=1)
          txt = re.sub(r'minSdk\s+2[0-3]\b', 'minSdk 24', txt)
          with open(path, 'w') as f: f.write(txt)
          print("build.gradle OK")
          PYEOF

      # ── 2. gradle.properties ─────────────────────────────────────────────────
      - name: Patch gradle.properties
        run: |
          sed -i 's/android\.useAndroidX=false/android.useAndroidX=true/' gradle.properties || true
          grep -q 'android.useAndroidX'    gradle.properties || echo 'android.useAndroidX=true'    >> gradle.properties
          grep -q 'android.enableJetifier' gradle.properties || echo 'android.enableJetifier=true' >> gradle.properties

      # ── 3. MainActivity.java — полный порт стабилизатора ────────────────────
      - name: Patch MainActivity.java
        run: |
          python3 - << 'PYEOF'
          import sys, os

          candidates = [
              'app/src/main/java/com/simplecam/MainActivity.java',
              'app/src/main/java/com/example/simplecam/MainActivity.java',
          ]
          src_path = None
          for c in candidates:
              if os.path.exists(c): src_path = c; break
          if not src_path:
              print("ERROR: MainActivity.java not found"); sys.exit(1)

          with open(src_path, encoding='utf-8') as f:
              src = f.read()

          MARKER = '// EIS_V4_PATCHED'
          if MARKER in src:
              print("Already V4, skipping"); sys.exit(0)

          ok = []
          def patch(name, old, new, s):
              if old in s: ok.append(name); return s.replace(old, new, 1)
              print(f"WARNING: {name} — anchor not found"); return s

          # ── P1: поле mCbEis ──────────────────────────────────────────────────
          src = patch('P1',
              'private CheckBox mCbSoftClip, mCbManualFocus, mCbFocusAssist;',
              f'private CheckBox mCbSoftClip, mCbManualFocus, mCbFocusAssist, mCbEis; {MARKER}',
              src)

          # ── P2: все поля EIS ─────────────────────────────────────────────────
          EIS_FIELDS = (
              '\t// ─── EIS — порт из рабочего стабилизатора ──────────────────────────────\n'
              '\t// Размер потока для анализа (отдельный ImageReader, не видео)\n'
              '\tprivate static final int EIS_W = 640, EIS_H = 360;\n'
              '\t// Поиск: радиус, максимальный прыжок, отступ от края\n'
              '\tprivate static final int EIS_SEARCH_R  = 120;\n'
              '\tprivate static final int EIS_MAX_JUMP  = 100;\n'
              '\tprivate static final int EIS_EDGE_MARGIN = 40;\n'
              '\t// Состояние включения\n'
              '\tprivate volatile boolean mEisEnabled    = false;\n'
              '\tprivate volatile float   mEisDriftSpeed = 0.03f;\n'
              '\t// ImageReader для анализа кадров\n'
              '\tprivate android.media.ImageReader mEisReader = null;\n'
              '\t// Вычисленный сдвиг (в пикселях EIS-кадра) → масштабируется в SCALER_CROP_REGION\n'
              '\tprivate volatile double mEisShiftX = 0, mEisShiftY = 0;\n'
              '\t// Трекинг: шаблон, позиции\n'
              '\tprivate org.opencv.core.Mat mEisTemplate = null;\n'
              '\tprivate int    mEisTmplW = 0, mEisTmplH = 0;\n'
              '\tprivate int    mEisIdealX = 0, mEisIdealY = 0;\n'
              '\tprivate int    mEisLastMatchX = 0, mEisLastMatchY = 0;\n'
              '\tprivate double mEisVirtualX   = 0, mEisVirtualY   = 0;\n'
              '\t// Ghost-рамка: смещение последней позиции до сброса (желтый прямоугольник)\n'
              '\tprivate volatile Integer mEisGhostOffX = null, mEisGhostOffY = null;\n'
              '\t// Нормализованные координаты для оверлея (0.0‒1.0)\n'
              '\tprivate volatile float mEisNormMatchX = 0.5f, mEisNormMatchY = 0.5f;\n'
              '\tprivate volatile float mEisNormTmplW  = 0.2f, mEisNormTmplH  = 0.2f;\n'
              '\tprivate volatile float mEisNormGhostX = 0f,   mEisNormGhostY = 0f;\n'
              '\tprivate volatile boolean mEisHasGhost = false;\n'
              '\t// Delta-time для плавного дрейфа (как в рабочем приложении)\n'
              '\tprivate long   mEisLastFrameTime = 0;\n'
              '\t// Оверлей — прозрачный View поверх SurfaceView\n'
              '\tprivate EisOverlayView mEisOverlay = null;\n'
              '\t\n'
          )
          src = patch('P2', '\t// ─── Zoom-цикл', EIS_FIELDS + '\t// ─── Zoom-цикл', src)

          # ── P3: OpenCV init + добавляем EisOverlayView в buildLayout ─────────
          src = patch('P3',
              '\t\tshowAirplaneModeReminder();\n\t\tcheckPerms();',
              '\t\tshowAirplaneModeReminder();\n'
              '\t\torg.opencv.android.OpenCVLoader.initDebug();\n'
              '\t\tcheckPerms();',
              src)

          # ── P4: EisOverlayView добавляем в root сразу после mSv ──────────────
          src = patch('P4',
              'root.addView(mSv, svLP);\n\n\t\t// ── Осциллограф',
              'root.addView(mSv, svLP);\n\n'
              '\t\t// ── EIS overlay — прозрачный слой поверх превью ──────────────\n'
              '\t\tmEisOverlay = new EisOverlayView(this);\n'
              '\t\tFrameLayout.LayoutParams eisOvLP = new FrameLayout.LayoutParams(\n'
              '\t\t\t\tViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);\n'
              '\t\teisOvLP.gravity = Gravity.CENTER;\n'
              '\t\troot.addView(mEisOverlay, eisOvLP);\n\n'
              '\t\t// ── Осциллограф',
              src)

          # ── P5: EIS ImageReader в список targets Camera2-сессии ───────────────
          src = patch('P5',
              '\t\t\ttargets.add(preview);\n'
              '\t\t\tif (mEncSurface != null && mEncSurface.isValid())\n'
              '\t\t\ttargets.add(mEncSurface);\n'
              '\t\t\t\n'
              '\t\t\tmCamDev.createCaptureSession',
              '\t\t\ttargets.add(preview);\n'
              '\t\t\tif (mEncSurface != null && mEncSurface.isValid())\n'
              '\t\t\ttargets.add(mEncSurface);\n'
              '\t\t\tif (mEisEnabled) { setupEisReader(); if (mEisReader != null) targets.add(mEisReader.getSurface()); }\n'
              '\t\t\t\n'
              '\t\t\tmCamDev.createCaptureSession',
              src)

          # ── P6: EIS surface как addTarget в CaptureRequest ───────────────────
          src = patch('P6',
              '\t\t\tif (mEncSurface != null && mEncSurface.isValid())\n'
              '\t\t\trb.addTarget(mEncSurface);\n'
              '\t\t\t\n'
              '\t\t\tif (mManualFocus)',
              '\t\t\tif (mEncSurface != null && mEncSurface.isValid())\n'
              '\t\t\trb.addTarget(mEncSurface);\n'
              '\t\t\tif (mEisEnabled && mEisReader != null)\n'
              '\t\t\trb.addTarget(mEisReader.getSurface());\n'
              '\t\t\t\n'
              '\t\t\tif (mManualFocus)',
              src)

          # ── P7: EIS-сдвиг в SCALER_CROP_REGION ──────────────────────────────
          src = patch('P7',
              '\t\t\tif (mSensorRect != null) {\n'
              '\t\t\t\tint cropW = Math.max(1, (int) (mSensorRect.width() / mZoomLevel));\n'
              '\t\t\t\tint cropH = Math.max(1, (int) (mSensorRect.height() / mZoomLevel));\n'
              '\t\t\t\tint cropX = mSensorRect.left + (mSensorRect.width() - cropW) / 2;\n'
              '\t\t\t\tint cropY = mSensorRect.top + (mSensorRect.height() - cropH) / 2;\n'
              '\t\t\t\trb.set(CaptureRequest.SCALER_CROP_REGION, new Rect(cropX, cropY, cropX + cropW, cropY + cropH));\n'
              '\t\t\t}',
              '\t\t\tif (mSensorRect != null) {\n'
              '\t\t\t\tint cropW = Math.max(1, (int) (mSensorRect.width() / mZoomLevel));\n'
              '\t\t\t\tint cropH = Math.max(1, (int) (mSensorRect.height() / mZoomLevel));\n'
              '\t\t\t\tint cropX = mSensorRect.left + (mSensorRect.width() - cropW) / 2;\n'
              '\t\t\t\tint cropY = mSensorRect.top + (mSensorRect.height() - cropH) / 2;\n'
              '\t\t\t\t// EIS: сдвигаем кроп-окно на вычисленный стабилизатором сдвиг\n'
              '\t\t\t\tif (mEisEnabled && mEisReader != null) {\n'
              '\t\t\t\t\tdouble sx = (double) cropW / EIS_W;\n'
              '\t\t\t\t\tdouble sy = (double) cropH / EIS_H;\n'
              '\t\t\t\t\tint dx = (int)(mEisShiftX * sx);\n'
              '\t\t\t\t\tint dy = (int)(mEisShiftY * sy);\n'
              '\t\t\t\t\tcropX = Math.max(mSensorRect.left,\n'
              '\t\t\t\t\t        Math.min(mSensorRect.right  - cropW, cropX - dx));\n'
              '\t\t\t\t\tcropY = Math.max(mSensorRect.top,\n'
              '\t\t\t\t\t        Math.min(mSensorRect.bottom - cropH, cropY - dy));\n'
              '\t\t\t\t}\n'
              '\t\t\t\trb.set(CaptureRequest.SCALER_CROP_REGION, new Rect(cropX, cropY, cropX + cropW, cropY + cropH));\n'
              '\t\t\t}',
              src)

          # ── P8: UI-строка EIS+Drift первой в панели (после srcRow) ───────────
          EIS_ROW = (
              '\t\t// ── EIS ── (первая строка в панели, всегда видна) ───────────────────────\n'
              '\t\tLinearLayout eisRow = new LinearLayout(this);\n'
              '\t\teisRow.setOrientation(LinearLayout.HORIZONTAL);\n'
              '\t\teisRow.setGravity(Gravity.CENTER_VERTICAL);\n'
              '\t\tmCbEis = new CheckBox(this);\n'
              '\t\tmCbEis.setText("EIS");\n'
              '\t\tmCbEis.setTextColor(0xCCCCCCCC);\n'
              '\t\tmCbEis.setTextSize(12);\n'
              '\t\tmCbEis.setOnCheckedChangeListener((v, checked) -> {\n'
              '\t\t\tmEisEnabled = checked;\n'
              '\t\t\tif (!checked) {\n'
              '\t\t\t\tmEisShiftX = 0; mEisShiftY = 0;\n'
              '\t\t\t\tmEisHasGhost = false;\n'
              '\t\t\t\tif (mEisOverlay != null) mEisOverlay.postInvalidate();\n'
              '\t\t\t}\n'
              '\t\t\tstartPreview();\n'
              '\t\t});\n'
              '\t\tfinal TextView tvDrift = new TextView(this);\n'
              '\t\ttvDrift.setText(" D:0.03");\n'
              '\t\ttvDrift.setTextColor(0xCCCCCCCC);\n'
              '\t\ttvDrift.setTextSize(11);\n'
              '\t\tSeekBar sbDrift = new SeekBar(this);\n'
              '\t\tsbDrift.setMax(99);       // 0..99 → 0.001..0.100\n'
              '\t\tsbDrift.setProgress(29);  // default 0.030\n'
              '\t\tsbDrift.setLayoutParams(new LinearLayout.LayoutParams(dp(120), ViewGroup.LayoutParams.WRAP_CONTENT));\n'
              '\t\tsbDrift.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {\n'
              '\t\t\tpublic void onProgressChanged(SeekBar s, int p, boolean u) {\n'
              '\t\t\t\tmEisDriftSpeed = 0.001f + p * 0.001f;\n'
              '\t\t\t\ttvDrift.setText(String.format(java.util.Locale.US, " D:%.3f", mEisDriftSpeed));\n'
              '\t\t\t}\n'
              '\t\t\tpublic void onStartTrackingTouch(SeekBar s) {}\n'
              '\t\t\tpublic void onStopTrackingTouch(SeekBar s) {}\n'
              '\t\t});\n'
              '\t\teisRow.addView(mCbEis);\n'
              '\t\teisRow.addView(tvDrift);\n'
              '\t\teisRow.addView(sbDrift);\n'
              '\t\tmAudioSrcPanel.addView(eisRow);\n'
              '\t\t\n'
              '\t\tmCbSoftClip'
          )
          src = patch('P8',
              '\t\tmAudioSrcPanel.addView(srcRow);\n\t\t\n\t\tmCbSoftClip',
              '\t\tmAudioSrcPanel.addView(srcRow);\n\t\t\n' + EIS_ROW,
              src)

          # ── P9: очистка ресурсов ─────────────────────────────────────────────
          src = patch('P9',
              '\t\tif (mEncSurface!=null){try{mEncSurface.release();}catch(Exception e){} mEncSurface=null;}',
              '\t\tif (mEncSurface!=null){try{mEncSurface.release();}catch(Exception e){} mEncSurface=null;}\n'
              '\t\tif (mEisReader!=null){try{mEisReader.close();}catch(Exception e){} mEisReader=null;}\n'
              '\t\tif (mEisTemplate!=null){mEisTemplate.release(); mEisTemplate=null;}',
              src)

          # ── P10: методы EIS + класс EisOverlayView ───────────────────────────
          EIS_CODE = r'''
	// =========================================================================
	// EIS — полный порт из рабочего стабилизатора
	// =========================================================================

	/** (Пере)создаёт ImageReader для EIS-анализа; вызывается из startPreview(). */
	private void setupEisReader() {
		if (mEisReader != null) { try { mEisReader.close(); } catch (Exception e) {} mEisReader = null; }
		if (mEisTemplate != null) { mEisTemplate.release(); mEisTemplate = null; }
		mEisShiftX = 0; mEisShiftY = 0;
		mEisLastMatchX = 0; mEisLastMatchY = 0;
		mEisVirtualX   = 0; mEisVirtualY   = 0;
		mEisTmplW = 0; mEisTmplH = 0;
		mEisGhostOffX = null; mEisGhostOffY = null;
		mEisHasGhost = false;
		mEisLastFrameTime = 0;

		mEisReader = android.media.ImageReader.newInstance(
				EIS_W, EIS_H, android.graphics.ImageFormat.YUV_420_888, 2);
		mEisReader.setOnImageAvailableListener(reader -> {
			android.media.Image img = reader.acquireLatestImage();
			if (img != null) { try { processEisFrame(img); } finally { img.close(); } }
		}, mCamHandler);
	}

	/**
	 * Полный порт processFrame() из рабочего EIS-приложения.
	 * Читает Y-плоскость YUV, делает template matching, вычисляет сдвиг.
	 * Результат: mEisShiftX/Y → применяется в SCALER_CROP_REGION.
	 * Визуализация: mEisNorm* → рисуется через EisOverlayView.
	 */
	private void processEisFrame(android.media.Image image) {
		if (!mEisEnabled) return;

		// ── Delta Time (как в рабочем приложении) ─────────────────────────────
		long now = System.currentTimeMillis();
		double dt = 1.0;
		if (mEisLastFrameTime > 0) {
			dt = (now - mEisLastFrameTime) / 33.333; // нормализация к 30fps
			if (dt > 3.0) dt = 3.0; // защита от резкого скачка при первом кадре после паузы
		}
		mEisLastFrameTime = now;

		// ── Чтение Y-плоскости в Mat ───────────────────────────────────────────
		android.media.Image.Plane yPlane = image.getPlanes()[0];
		java.nio.ByteBuffer yBuf = yPlane.getBuffer();
		int stride = yPlane.getRowStride();
		int w = image.getWidth(), h = image.getHeight();
		org.opencv.core.Mat gray = new org.opencv.core.Mat(h, w, org.opencv.core.CvType.CV_8UC1);
		byte[] data = new byte[h * w];
		if (stride == w) {
			yBuf.get(data);
		} else {
			byte[] row = new byte[stride];
			for (int y = 0; y < h; y++) {
				yBuf.position(y * stride);
				yBuf.get(row, 0, Math.min(stride, w));
				System.arraycopy(row, 0, data, y * w, w);
			}
		}
		gray.put(0, 0, data);

		// ── Коррекция ориентации ────────────────────────────────────────────────
		if      (mSensorOrientation == 90)  org.opencv.core.Core.rotate(gray, gray, org.opencv.core.Core.ROTATE_90_CLOCKWISE);
		else if (mSensorOrientation == 270) org.opencv.core.Core.rotate(gray, gray, org.opencv.core.Core.ROTATE_90_COUNTERCLOCKWISE);
		else if (mSensorOrientation == 180) org.opencv.core.Core.rotate(gray, gray, org.opencv.core.Core.ROTATE_180);

		int gw = gray.cols(), gh = gray.rows();

		// ── Инициализация геометрии по первому кадру (как в рабочем приложении) ─
		if (mEisTmplW == 0 || mEisTmplH == 0) {
			mEisTmplW = gw / 5;   // шаблон = 1/5 ширины
			mEisTmplH = gh / 5;
			mEisIdealX = (gw - mEisTmplW) / 2;
			mEisIdealY = (gh - mEisTmplH) / 2;
			mEisLastMatchX = mEisIdealX;
			mEisLastMatchY = mEisIdealY;
			mEisVirtualX   = mEisIdealX;
			mEisVirtualY   = mEisIdealY;
		}

		// ── Создаём шаблон из первого кадра ────────────────────────────────────
		if (mEisTemplate == null) {
			if (mEisIdealX + mEisTmplW <= gw && mEisIdealY + mEisTmplH <= gh) {
				mEisTemplate = new org.opencv.core.Mat(
					gray, new org.opencv.core.Rect(mEisIdealX, mEisIdealY, mEisTmplW, mEisTmplH)).clone();
			}
			gray.release(); return;
		}

		// ── Template matching в ROI вокруг последней найденной позиции ─────────
		int roiX = Math.max(0, mEisLastMatchX - EIS_SEARCH_R);
		int roiY = Math.max(0, mEisLastMatchY - EIS_SEARCH_R);
		int roiW = Math.min(gw - roiX, mEisTmplW + EIS_SEARCH_R * 2);
		int roiH = Math.min(gh - roiY, mEisTmplH + EIS_SEARCH_R * 2);
		if (roiW <= mEisTmplW || roiH <= mEisTmplH) { gray.release(); return; }

		org.opencv.core.Mat roi    = new org.opencv.core.Mat(gray,
				new org.opencv.core.Rect(roiX, roiY, roiW, roiH));
		org.opencv.core.Mat result = new org.opencv.core.Mat();
		org.opencv.imgproc.Imgproc.matchTemplate(roi, mEisTemplate, result,
				org.opencv.imgproc.Imgproc.TM_CCOEFF_NORMED);
		org.opencv.core.Core.MinMaxLocResult mm = org.opencv.core.Core.minMaxLoc(result);

		int matchX = roiX + (int) mm.maxLoc.x;
		int matchY = roiY + (int) mm.maxLoc.y;
		double jump = Math.hypot(matchX - mEisLastMatchX, matchY - mEisLastMatchY);
		boolean edge = matchX < EIS_EDGE_MARGIN || matchX + mEisTmplW > gw - EIS_EDGE_MARGIN
				|| matchY < EIS_EDGE_MARGIN || matchY + mEisTmplH > gh - EIS_EDGE_MARGIN;

		if (mm.maxVal < 0.4 || edge || jump > EIS_MAX_JUMP) {
			// Потеря — плавный сброс с сохранением ghost-рамки
			eisSmoothReset(gray, gw, gh, matchX, matchY);
			matchX = mEisIdealX; matchY = mEisIdealY;
		} else {
			mEisLastMatchX = matchX; mEisLastMatchY = matchY;
		}

		// ── Delta-time дрейф (точная копия рабочего приложения) ────────────────
		double driftFactor = mEisDriftSpeed * dt;
		if (driftFactor > 1.0) driftFactor = 1.0;
		mEisVirtualX += (matchX - mEisVirtualX) * driftFactor;
		mEisVirtualY += (matchY - mEisVirtualY) * driftFactor;

		// Сдвиг = отклонение реальной позиции от виртуальной «точки покоя»
		mEisShiftX = matchX - mEisVirtualX;
		mEisShiftY = matchY - mEisVirtualY;

		// Обновляем CROP через buildAndSendRequest
		if (mCamHandler != null) mCamHandler.post(this::buildAndSendRequest);

		// ── Нормализованные координаты для оверлея ─────────────────────────────
		mEisNormMatchX = (float) matchX / gw;
		mEisNormMatchY = (float) matchY / gh;
		mEisNormTmplW  = (float) mEisTmplW / gw;
		mEisNormTmplH  = (float) mEisTmplH / gh;
		if (mEisGhostOffX != null) {
			mEisNormGhostX = (float)(matchX + mEisGhostOffX) / gw;
			mEisNormGhostY = (float)(matchY + mEisGhostOffY) / gh;
		}
		if (mEisOverlay != null) mEisOverlay.postInvalidate();

		gray.release(); roi.release(); result.release();
	}

	/**
	 * Плавный сброс шаблона с сохранением ghost-позиции.
	 * Точная копия triggerSmoothReset() из рабочего приложения.
	 */
	private void eisSmoothReset(org.opencv.core.Mat gray, int gw, int gh,
	                             int badMatchX, int badMatchY) {
		if (mEisTemplate == null) return;

		// Запоминаем ghost-смещение (жёлтая рамка)
		mEisGhostOffX = mEisLastMatchX - mEisIdealX;
		mEisGhostOffY = mEisLastMatchY - mEisIdealY;
		mEisHasGhost  = true;

		double currentDx = mEisLastMatchX - mEisVirtualX;
		double currentDy = mEisLastMatchY - mEisVirtualY;

		// Берём новый шаблон из центра
		mEisTemplate.release();
		if (mEisIdealX + mEisTmplW <= gw && mEisIdealY + mEisTmplH <= gh) {
			mEisTemplate = new org.opencv.core.Mat(
				gray, new org.opencv.core.Rect(mEisIdealX, mEisIdealY, mEisTmplW, mEisTmplH)).clone();
		}

		// Смещаем виртуальную точку так, чтобы не было скачка
		mEisVirtualX = mEisIdealX - currentDx;
		mEisVirtualY = mEisIdealY - currentDy;
		mEisLastMatchX = mEisIdealX;
		mEisLastMatchY = mEisIdealY;
	}

	// =========================================================================
	// EisOverlayView — прозрачный View поверх SurfaceView
	// Рисует: синий прямоугольник (текущий трекинг) +
	//         жёлтый прямоугольник ghost (где шаблон был до сброса)
	// =========================================================================
	private class EisOverlayView extends android.view.View {
		private final android.graphics.Paint mPaintBlue  = new android.graphics.Paint();
		private final android.graphics.Paint mPaintYellow = new android.graphics.Paint();

		EisOverlayView(android.content.Context ctx) {
			super(ctx);
			setWillNotDraw(false);
			mPaintBlue.setStyle(android.graphics.Paint.Style.STROKE);
			mPaintBlue.setColor(0xFF3399FF);   // синий
			mPaintBlue.setStrokeWidth(4f);
			mPaintBlue.setAntiAlias(true);
			mPaintYellow.setStyle(android.graphics.Paint.Style.STROKE);
			mPaintYellow.setColor(0xFFFFDD00); // жёлтый
			mPaintYellow.setStrokeWidth(3f);
			mPaintYellow.setAntiAlias(true);
		}

		@Override
		protected void onDraw(android.graphics.Canvas canvas) {
			if (!mEisEnabled) return;

			float vw = getWidth(), vh = getHeight();
			if (vw == 0 || vh == 0) return;

			// Соотношение сторон EIS-кадра vs экрана
			float frameAspect = (float) EIS_W / EIS_H;
			float viewAspect  = vw / vh;
			float drawW, drawH, offX, offY;
			if (viewAspect > frameAspect) {
				drawH = vh; drawW = drawH * frameAspect;
				offX = (vw - drawW) / 2f; offY = 0;
			} else {
				drawW = vw; drawH = drawW / frameAspect;
				offX = 0; offY = (vh - drawH) / 2f;
			}

			// Синий прямоугольник — текущая позиция трекера
			float bx = offX + mEisNormMatchX * drawW;
			float by = offY + mEisNormMatchY * drawH;
			float bw = mEisNormTmplW * drawW;
			float bh = mEisNormTmplH * drawH;
			canvas.drawRect(bx, by, bx + bw, by + bh, mPaintBlue);

			// Жёлтый прямоугольник — ghost после сброса
			if (mEisHasGhost) {
				float gx = offX + mEisNormGhostX * drawW;
				float gy = offY + mEisNormGhostY * drawH;
				canvas.drawRect(gx, gy, gx + bw, gy + bh, mPaintYellow);
			}
		}
	}
