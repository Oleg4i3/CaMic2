name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # ── 3. Gradle 8.7 (без wrapper-jar в репо) ─────────────────────────
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # ── 4. Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      # ── 5. Release APK (unsigned) ──────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: gradle :app:assembleRelease --no-daemon

      # ── 6. Signed Release (только если секреты заданы) ─────────────────
      - name: Sign Release APK
        if: >
          github.event_name != 'pull_request' &&
          secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/SimpleCam-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm /tmp/release.jks

      # ── 7. Артефакты ───────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpleCam-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpleCam-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
